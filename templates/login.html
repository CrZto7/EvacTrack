{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-4">

        <div class="card shadow-sm border-0 p-4">
            <h4 class="dashboard-title mb-3">Login</h4>

            {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <input type="text" name="username"
                           class="form-control"
                           placeholder="Username"
                           required>
                </div>

                <div class="mb-3">
                    <input type="password" name="password"
                           class="form-control"
                           placeholder="Password"
                           required>
                </div>

                <button class="btn btn-dark w-100">
                    Login
                </button>
            </form>
            
            <div class="mt-3 text-center">
                <a href="{{ url_for('reset_password') }}" class="text-decoration-none text-muted small">Forgot Password?</a>
            </div>
        </div>

    </div>
</div>

{% endblock %}
