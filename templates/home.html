{% extends "base.html" %}
{% block content %}

<div class="text-center py-5">

    <h1 class="fw-bold mb-3">Emergency Shelter Management</h1>
    <p class="text-muted mb-5">
        Coordinated shelter allocation and volunteer management system.
    </p>

    <div class="d-flex justify-content-center gap-3 flex-wrap">

        <a href="{{ url_for('login') }}"
           class="btn btn-dark px-4">

        </a>

</div>
