{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 p-4 rounded-4 mt-5">
            <h4 class="fw-bold mb-3 text-center"><i class="bi bi-shield-lock me-2"></i>Reset Password</h4>
            <p class="text-muted text-center small mb-4">Enter your username and a new strong password.</p>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label fw-semibold small">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold small">Old Password</label>
                    <input type="password" name="old_password" class="form-control" required placeholder="Current Password">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold small">New Password</label>
                    <input type="password" name="new_password" class="form-control" required placeholder="8+ chars, 1 num, 1 upper, 1 special">
                </div>
                <button type="submit" class="btn btn-dark w-100 rounded-pill shadow-sm fw-bold">Reset Password</button>
            </form>
            <div class="mt-3 text-center">
                <a href="{{ url_for('login') }}" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
